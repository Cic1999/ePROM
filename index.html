<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ePROM 問卷回收分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f7f8fc;
    --border: rgba(0,0,0,0.07);
    --text-primary: #1a1d2e;
    --text-secondary: #5a6072;
    --text-muted: #9097ad;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);

    --blue:  #1D6FB8; --blue-bg: #EBF4FF;  --blue-border: #93C5FD;
    --green: #0D7A4E; --green-bg: #ECFDF5; --green-border: #6EE7B7;
    --amber: #92400E; --amber-bg: #FFFBEB; --amber-border: #FCD34D;
    --red:   #991B1B; --red-bg: #FEF2F2;   --red-border: #FCA5A5;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { font-family: 'Noto Sans TC', 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0F3A6E 0%, #1D6FB8 45%, #0D7A4E 100%);
    padding: 22px 32px;
    color: #fff;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-badge {
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.28);
    border-radius: 20px; padding: 4px 14px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.9);
  }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .header-meta { background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.22); border-radius: 10px; padding: 6px 14px; text-align: right; }
  .header-meta-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 1px; }
  .header-meta-val { font-size: 13px; font-weight: 600; }

  /* ── OVERALL STRIP ── */
  .overall-strip {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    flex-shrink: 0;
  }
  .strip-metric { display: flex; align-items: center; gap: 12px; }
  .strip-metric-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .icon-blue  { background: var(--blue-bg);  color: var(--blue); }
  .icon-green { background: var(--green-bg); color: var(--green); }
  .icon-amber { background: var(--amber-bg); color: var(--amber); }
  .icon-red   { background: var(--red-bg);   color: var(--red); }
  .strip-metric-info {}
  .strip-metric-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-secondary); }
  .strip-metric-value { font-size: 26px; font-weight: 700; line-height: 1.1; font-family: 'DM Sans', sans-serif; color: var(--text-primary); }
  .strip-metric-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  /* ── BODY ── */
  .body { display: flex; flex: 1; min-height: 0; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 210px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section-label {
    padding: 14px 16px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .sidebar-team {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.12s, border-color 0.12s;
    position: relative;
  }
  .sidebar-team:hover { background: var(--bg); }
  .sidebar-team.active { border-left-color: var(--team-color); background: var(--bg); }
  .sidebar-team-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--team-color); flex-shrink: 0; }
  .sidebar-team-name { font-size: 13px; font-weight: 500; color: var(--text-primary); flex: 1; line-height: 1.3; }
  .sidebar-team-rate {
    font-size: 11px; font-weight: 700;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 1px 7px;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .sidebar-team.active .sidebar-team-rate { background: var(--team-color); border-color: var(--team-color); color: #fff; }

  .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }
  .sidebar-overall {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.12s, border-color 0.12s;
  }
  .sidebar-overall:hover { background: var(--bg); }
  .sidebar-overall.active { border-left-color: #1D6FB8; background: var(--bg); }
  .sidebar-overall-icon { width: 10px; height: 10px; border-radius: 3px; background: linear-gradient(135deg, #1D6FB8, #0D7A4E); flex-shrink: 0; }
  .sidebar-overall-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }

  /* ── CONTENT ── */
  .content { flex: 1; min-width: 0; overflow-y: auto; padding: 24px 28px 32px; }

  /* ── CONTENT HEADER ── */
  .content-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
  }
  .content-title-row { display: flex; align-items: center; gap: 10px; }
  .content-team-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .content-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .content-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; margin-left: 24px; }

  /* ── METRIC CARDS ── */
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .metric { border-radius: var(--radius-sm); border: 1.5px solid transparent; padding: 14px 16px; box-shadow: var(--shadow-sm); }
  .metric-blue  { background: var(--blue-bg);  border-color: var(--blue-border); }
  .metric-green { background: var(--green-bg); border-color: var(--green-border); }
  .metric-amber { background: var(--amber-bg); border-color: var(--amber-border); }
  .metric-red   { background: var(--red-bg);   border-color: var(--red-border); }
  .metric-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .metric-blue  .metric-label { color: var(--blue); }
  .metric-green .metric-label { color: var(--green); }
  .metric-amber .metric-label { color: var(--amber); }
  .metric-red   .metric-label { color: var(--red); }
  .metric-value { font-size: 30px; font-weight: 700; line-height: 1; font-family: 'DM Sans', sans-serif; }
  .metric-blue  .metric-value { color: #0F3A6E; }
  .metric-green .metric-value { color: #064E36; }
  .metric-amber .metric-value { color: #78350F; }
  .metric-red   .metric-value { color: #7F1D1D; }
  .metric-sub { font-size: 11px; margin-top: 4px; }
  .metric-blue  .metric-sub { color: var(--blue); }
  .metric-green .metric-sub { color: var(--green); }
  .metric-amber .metric-sub { color: var(--amber); }
  .metric-red   .metric-sub { color: var(--red); }
  .rate-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: rgba(0,0,0,0.08); overflow: hidden; }
  .rate-fill { height: 100%; border-radius: 2px; }
  .metric-blue  .rate-fill { background: var(--blue); }
  .metric-green .rate-fill { background: var(--green); }

  /* ── CARD ── */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px; }
  .card-header { padding: 11px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card-header-dot { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, #1D6FB8, #0D7A4E); flex-shrink: 0; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); text-align: left; padding: 9px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
  td { padding: 10px 16px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(29,111,184,0.03); }
  .total-row td { background: var(--surface2); font-weight: 700; border-top: 1px solid var(--border); }

  /* ── LEGEND ── */
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── CHART ── */
  .chart-wrap { position: relative; width: 100%; height: 240px; margin-bottom: 16px; }

  /* ── BADGE ── */
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
  .badge-death { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* ── OVERALL TABLE view ── */
  .overall-view {}
  .section-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-secondary); margin-bottom: 12px;
  }
  .section-label::before { content: ''; display: block; width: 3px; height: 14px; border-radius: 2px; background: linear-gradient(180deg, #1D6FB8, #0D7A4E); flex-shrink: 0; }

  /* ── TEAM OVERVIEW CARDS (overall page) ── */
  .team-overview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .team-overview-card {
    background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border);
    box-shadow: var(--shadow-sm); overflow: hidden; cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
  }
  .team-overview-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .team-overview-card-head {
    padding: 10px 14px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .team-overview-card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .team-overview-card-name { font-size: 13px; font-weight: 700; }
  .team-overview-card-body { padding: 12px 14px; }
  .team-ov-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
  .team-ov-stat-label { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .team-ov-stat-val { font-size: 18px; font-weight: 700; font-family: 'DM Sans', sans-serif; color: var(--text-primary); }
  .team-ov-stat-sub { font-size: 11px; color: var(--text-secondary); }
  .team-ov-bar { height: 5px; border-radius: 3px; background: var(--bg); overflow: hidden; }
  .team-ov-bar-fill { height: 100%; border-radius: 3px; }
  .team-ov-link { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: right; }

  .muted { color: #d0d4e0; }

  .rate-note {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 14px;
    margin-top: 4px;
  }
  .rate-note i { font-size: 14px; flex-shrink: 0; color: var(--blue); }

  /* ── RESPONSIVE ── */
  @media (max-width: 860px) {
    .sidebar { width: 170px; }
    .metric-grid { grid-template-columns: repeat(2,1fr); }
    .team-overview-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .body { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; }
    .sidebar-section-label { display: none; }
    .sidebar-team, .sidebar-overall { padding: 10px 12px; white-space: nowrap; }
    .overall-strip { grid-template-columns: repeat(2,1fr); padding: 12px 16px; }
    .content { padding: 16px; }
    .header { padding: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="header-badge">ePROM</div>
    <div>
      <div class="header-title">ePROM 問卷回收分析</div>
      <div class="header-sub">回收區間：2025/08/01 – 2026/05/06</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="header-meta-label">資料更新日期</div>
    <div class="header-meta-val">2026/05/06</div>
  </div>
</header>

<!-- OVERALL STRIP -->
<div class="overall-strip" id="overallStrip"></div>

<!-- BODY -->
<div class="body">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-overall active" id="sidebarOverall" onclick="selectView('overall')">
      <div class="sidebar-overall-icon"></div>
      <div class="sidebar-overall-name">整體總覽</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">各團隊</div>
    <div id="sidebarTeams"></div>
  </nav>

  <!-- CONTENT -->
  <main class="content" id="contentArea"></main>

</div>

<script>
const TEAMS_CONFIG = {
  "OHCA":       { color: "#7C3AED" },
  "Trauma":     { color: "#0369A1" },
  "腦中風":     { color: "#047857" },
  "加護護理團隊": { color: "#B45309" },
  "精神醫學部":  { color: "#BE185D" },
};

const DATA = {
  "OHCA": [
    { quest: "事件發生後30日", sent: 10,  recv: 1,  death: 0 },
    { quest: "出院後30天",     sent: 8,   recv: 0,  death: 0 },
    { quest: "出院後90天",     sent: 6,   recv: 0,  death: 0 }
  ],
  "Trauma": [
    { quest: "出院前（EQ-5D+IADL）", sent: 2,   recv: 2,  death: 0 },
    { quest: "出院後30天",           sent: 93,  recv: 22, death: 1 },
    { quest: "出院後90天",           sent: 145, recv: 18, death: 3 }
  ],
  "腦中風": [
    { quest: "出院後90天", sent: 851, recv: 161, death: 8 }
  ],
  "加護護理團隊": [
    { quest: "加護病房預防譫妄之照護經驗調查", sent: 17, recv: 16, death: 0 }
  ],
  "精神醫學部": [
    { quest: "BSRS簡式健康量表", sent: 9, recv: 7, death: 0 }
  ]
};

const TEAMS = Object.keys(DATA);
const ALL   = TEAMS.flatMap(t => DATA[t].map(r => ({ ...r, team: t })));
const pct   = (n, d) => d === 0 ? '—' : (n / d * 100).toFixed(1) + '%';
// 有效回收率：分母排除死亡案例（死亡者無法填答，不計入應回收數）
const pctEff = (recv, sent, death) => {
  const denom = sent - death;
  return denom <= 0 ? '—' : (recv / denom * 100).toFixed(1) + '%';
};
const pctN  = (n, d) => d === 0 ? 0 : Math.min(100, n / d * 100);
const pctEffN = (recv, sent, death) => {
  const denom = sent - death;
  return denom <= 0 ? 0 : Math.min(100, recv / denom * 100);
};
const RATE_NOTE = '回收率計算方式：回收數 ÷（發送數 − 死亡數），排除死亡案例後之有效回收率';
const teamSent  = t => DATA[t].reduce((s,r)=>s+r.sent,  0);
const teamRecv  = t => DATA[t].reduce((s,r)=>s+r.recv,  0);
const teamDeath = t => DATA[t].reduce((s,r)=>s+r.death, 0);

let currentView = 'overall';
let chartInst = null;

/* ── OVERALL STRIP ── */
function renderStrip() {
  const sent  = ALL.reduce((s,r)=>s+r.sent,  0);
  const recv  = ALL.reduce((s,r)=>s+r.recv,  0);
  const death = ALL.reduce((s,r)=>s+r.death, 0);
  const unrec = sent - recv - death;
  document.getElementById('overallStrip').innerHTML = `
    <div class="strip-metric">
      <div class="strip-metric-icon icon-blue"><i class="ti ti-send" aria-hidden="true"></i></div>
      <div class="strip-metric-info">
        <div class="strip-metric-label">整體發送</div>
        <div class="strip-metric-value">${sent}</div>
        <div class="strip-metric-sub">${TEAMS.length} 個團隊</div>
      </div>
    </div>
    <div class="strip-metric">
      <div class="strip-metric-icon icon-green"><i class="ti ti-clipboard-check" aria-hidden="true"></i></div>
      <div class="strip-metric-info">
        <div class="strip-metric-label">總回收</div>
        <div class="strip-metric-value">${recv}</div>
        <div class="strip-metric-sub">有效回收率 ${pctEff(recv, sent, death)}</div>
      </div>
    </div>
    <div class="strip-metric">
      <div class="strip-metric-icon icon-amber"><i class="ti ti-hourglass" aria-hidden="true"></i></div>
      <div class="strip-metric-info">
        <div class="strip-metric-label">未回收</div>
        <div class="strip-metric-value">${unrec}</div>
        <div class="strip-metric-sub">${pct(unrec, sent)}</div>
      </div>
    </div>
    <div class="strip-metric">
      <div class="strip-metric-icon icon-red"><i class="ti ti-heart-off" aria-hidden="true"></i></div>
      <div class="strip-metric-info">
        <div class="strip-metric-label">死亡案例</div>
        <div class="strip-metric-value">${death}</div>
        <div class="strip-metric-sub">${pct(death, sent)}</div>
      </div>
    </div>`;
}

/* ── SIDEBAR ── */
function renderSidebar() {
  document.getElementById('sidebarTeams').innerHTML = TEAMS.map(t => {
    const cfg = TEAMS_CONFIG[t] || { color: '#888' };
    const s = teamSent(t), r = teamRecv(t), d = teamDeath(t);
    const rate = pctEff(r, s, d);
    return `<div class="sidebar-team ${t===currentView?'active':''}"
      style="--team-color:${cfg.color}"
      onclick="selectView('${t}')">
      <div class="sidebar-team-dot"></div>
      <div class="sidebar-team-name">${t}</div>
      <div class="sidebar-team-rate">${rate}</div>
    </div>`;
  }).join('');

  const overallEl = document.getElementById('sidebarOverall');
  overallEl.classList.toggle('active', currentView === 'overall');
}

/* ── OVERALL VIEW ── */
function renderOverallView() {
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  // Build send table
  const quests = [...new Set(ALL.map(r => r.quest))];
  let tableHtml = `<thead><tr><th>問卷</th>${TEAMS.map(t=>`<th>${t}</th>`).join('')}<th>小計</th></tr></thead><tbody>`;
  quests.forEach(q => {
    let tot = 0; tableHtml += `<tr><td>${q}</td>`;
    TEAMS.forEach(t => {
      const s = (DATA[t]||[]).filter(r=>r.quest===q).reduce((a,r)=>a+r.sent,0);
      tot += s;
      tableHtml += `<td>${s||'<span class="muted">—</span>'}</td>`;
    });
    tableHtml += `<td style="font-weight:700">${tot}</td></tr>`;
  });
  tableHtml += `<tr class="total-row"><td>合計</td>`;
  let grand=0;
  TEAMS.forEach(t=>{ const s=teamSent(t); grand+=s; tableHtml+=`<td>${s}</td>`; });
  tableHtml += `<td>${grand}</td></tr></tbody>`;

  // Team overview cards
  const teamCardsHtml = TEAMS.map(t => {
    const cfg = TEAMS_CONFIG[t] || { color: '#888' };
    const s = teamSent(t), r = teamRecv(t), d = teamDeath(t);
    return `<div class="team-overview-card" onclick="selectView('${t}')">
      <div class="team-overview-card-head" style="background:${cfg.color}12; border-bottom:1px solid ${cfg.color}30">
        <div class="team-overview-card-dot" style="background:${cfg.color}"></div>
        <div class="team-overview-card-name" style="color:${cfg.color}">${t}</div>
      </div>
      <div class="team-overview-card-body">
        <div class="team-ov-stats">
          <div>
            <div class="team-ov-stat-label">發送</div>
            <div class="team-ov-stat-val">${s}</div>
          </div>
          <div>
            <div class="team-ov-stat-label">回收</div>
            <div class="team-ov-stat-val">${r}</div>
            <div class="team-ov-stat-sub">${pctEff(r,s,d)}</div>
          </div>
          <div>
            <div class="team-ov-stat-label">死亡</div>
            <div class="team-ov-stat-val" style="color:${d>0?'#991B1B':'inherit'}">${d||'—'}</div>
          </div>
        </div>
        <div class="team-ov-bar">
          <div class="team-ov-bar-fill" style="width:${pctEffN(r,s,d)}%;background:${cfg.color}"></div>
        </div>
        <div class="team-ov-link">點擊查看明細 →</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('contentArea').innerHTML = `
    <div class="overall-view">
      <div class="section-label">各團隊摘要</div>
      <div class="team-overview-grid">${teamCardsHtml}</div>
      <div class="section-label">整體發送表（依問卷 × 團隊）</div>
      <div class="card">
        <div class="table-wrap"><table>${tableHtml}</table></div>
      </div>
      <div class="rate-note"><i class="ti ti-info-circle"></i> ${RATE_NOTE}</div>
    </div>`;
}

/* ── TEAM VIEW ── */
function renderTeamView(team) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const cfg   = TEAMS_CONFIG[team] || { color: '#888' };
  const rows  = DATA[team];
  const sent  = teamSent(team);
  const recv  = teamRecv(team);
  const death = teamDeath(team);
  const unrec = sent - recv - death;

  let detailHtml = `<thead><tr><th>問卷</th><th>發送</th><th>回收</th><th>有效回收率 *</th><th>未回收</th><th>死亡</th></tr></thead><tbody>`;
  rows.forEach(r => {
    detailHtml += `<tr>
      <td>${r.quest}</td><td>${r.sent}</td><td>${r.recv}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-weight:700;min-width:42px">${pctEff(r.recv,r.sent,r.death)}</span>
          <div style="flex:1;height:5px;background:#e8edf5;border-radius:3px;min-width:40px">
            <div style="width:${pctEffN(r.recv,r.sent,r.death)}%;height:100%;background:${cfg.color};border-radius:3px"></div>
          </div>
        </div>
      </td>
      <td>${r.sent-r.recv-r.death}</td>
      <td>${r.death>0?`<span class="badge badge-death">${r.death}</span>`:'<span class="muted">—</span>'}</td>
    </tr>`;
  });
  if (rows.length > 1) {
    detailHtml += `<tr class="total-row"><td>合計</td><td>${sent}</td><td>${recv}</td><td>${pctEff(recv,sent,death)}</td><td>${unrec}</td><td>${death>0?`<span class="badge badge-death">${death}</span>`:'—'}</td></tr>`;
  }
  detailHtml += '</tbody>';

  document.getElementById('contentArea').innerHTML = `
    <div class="content-header">
      <div>
        <div class="content-title-row">
          <div class="content-team-dot" style="background:${cfg.color}"></div>
          <div class="content-title">${team}</div>
        </div>
        <div class="content-subtitle">問卷回收詳細數據</div>
      </div>
    </div>

    <div class="metric-grid">
      <div class="metric metric-blue">
        <div class="metric-label">發送</div>
        <div class="metric-value">${sent}</div>
        <div class="metric-sub">份問卷</div>
      </div>
      <div class="metric metric-green">
        <div class="metric-label">有效回收率</div>
        <div class="metric-value">${recv}</div>
        <div class="metric-sub">${pctEff(recv,sent,death)}</div>
        <div class="rate-bar"><div class="rate-fill" style="width:${pctEffN(recv,sent,death)}%"></div></div>
      </div>
      <div class="metric metric-amber">
        <div class="metric-label">未回收</div>
        <div class="metric-value">${unrec}</div>
        <div class="metric-sub">${pct(unrec,sent)}</div>
      </div>
      <div class="metric metric-red">
        <div class="metric-label">死亡</div>
        <div class="metric-value">${death}</div>
        <div class="metric-sub">佔 ${pct(death,sent)}</div>
      </div>
    </div>

    <div class="legend">
      <span><span class="legend-dot" style="background:${cfg.color}"></span>已回收</span>
      <span><span class="legend-dot" style="background:${cfg.color}44"></span>未回收</span>
      <span><span class="legend-dot" style="background:#E24B4A"></span>死亡</span>
    </div>
    <div class="chart-wrap"><canvas id="teamChart"></canvas></div>

    <div class="card">
      <div class="card-header">
        <span class="card-header-dot"></span>${team} — 各問卷明細
      </div>
      <div class="table-wrap"><table>${detailHtml}</table></div>
    </div>
    <div class="rate-note"><i class="ti ti-info-circle"></i> ${RATE_NOTE}</div>`;

  // draw chart
  const recvColor  = cfg.color;
  const unrecColor = cfg.color + '55';

  setTimeout(() => {
    const canvas = document.getElementById('teamChart');
    if (!canvas) return;
    if (chartInst) { chartInst.destroy(); chartInst = null; }
    chartInst = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: rows.map(r => r.quest),
        datasets: [
          { label:'已回收', data:rows.map(r=>r.recv),  backgroundColor:recvColor,  borderRadius:5, stack:'a' },
          { label:'未回收', data:rows.map(r=>Math.max(0,r.sent-r.recv-r.death)), backgroundColor:unrecColor, stack:'a' },
          { label:'死亡',   data:rows.map(r=>r.death), backgroundColor:'#E24B4A', borderRadius:5, stack:'a' },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>{
            const t=rows[ctx.dataIndex].sent;
            return ` ${ctx.dataset.label}: ${ctx.parsed.y} (${(ctx.parsed.y/t*100).toFixed(1)}%)`;
          }}}
        },
        scales:{
          x:{stacked:true,grid:{display:false},ticks:{font:{size:13,family:"'Noto Sans TC',sans-serif"},maxRotation:20}},
          y:{stacked:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:12},maxTicksLimit:6}}
        }
      }
    });
  }, 0);
}

/* ── SELECT VIEW ── */
function selectView(view) {
  currentView = view;
  renderSidebar();
  if (view === 'overall') {
    renderOverallView();
  } else {
    renderTeamView(view);
  }
}

/* ── INIT ── */
renderStrip();
renderSidebar();
renderOverallView();
</script>
</body>
</html>
